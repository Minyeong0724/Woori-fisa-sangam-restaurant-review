<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상암 맛집 등록</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
        .header { background: #e74c3c; color: white; padding: 20px 30px; display: flex; align-items: center; gap: 15px; }
        .header a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
        .header h1 { margin: 0; font-size: 1.3rem; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; border-radius: 16px; padding: 35px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 0.95rem; }
        .form-control {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 1rem; box-sizing: border-box; font-family: inherit;
        }
        .form-control:focus { outline: none; border-color: #e74c3c; box-shadow: 0 0 0 2px rgba(231,76,60,0.2); }
        textarea.form-control { resize: vertical; min-height: 100px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-weight: 500; color: #333; cursor: pointer; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        .btn-group { display: flex; gap: 12px; margin-top: 30px; }
        .btn {
            flex: 1; padding: 14px; border-radius: 8px; text-decoration: none;
            font-size: 1rem; font-weight: bold; text-align: center; border: none; cursor: pointer;
        }
        .btn-primary { background: #e74c3c; color: white; }
        .btn-primary:hover { background: #c0392b; }
        .btn-secondary { background: #eee; color: #333; }
        .btn-secondary:hover { background: #ddd; }
    </style>
</head>
<body>

<div class="header">
    <a th:href="@{/restaurant}">홈</a>
    <h1>새로운 맛집 등록</h1>
</div>

<div class="container">
    <div class="card">
        <form th:action="@{/restaurant}" th:object="${restaurant}" method="post">

            <div class="form-group">
                <label for="name">상호명</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="예: 상암 말차당" required>
            </div>

            <div class="form-group">
                <label for="category">카테고리</label>
                <select id="category" th:field="*{category}" class="form-control">
                    <option th:each="cat : ${categories}"
                            th:value="${cat.name()}"
                            th:text="${cat.displayName}">카테고리</option>
                </select>
            </div>

            <div class="form-group">
                <label for="address">주소</label>
                <input type="text" id="address" th:field="*{address}" class="form-control" placeholder="예: 서울 마포구 상암동..." required>
            </div>

            <div class="form-group">
                <label for="menu">대표 메뉴</label>
                <input type="text" id="menu" th:field="*{menu}" class="form-control" placeholder="예: 말차 롤케이크, 아메리카노" required>
            </div>

            <div class="form-group">
                <label for="avgPrice">평균 가격 (원)</label>
                <input type="number" id="avgPrice" th:field="*{avgPrice}" class="form-control" placeholder="예: 8000" required>
            </div>

            <div class="form-group">
                <label for="description">한줄평</label>
                <textarea id="description" th:field="*{description}" class="form-control" placeholder="맛집에 대한 간단한 설명을 적어주세요."></textarea>
            </div>

            <div class="form-group">
                <label class="checkbox-group">
                    <input type="checkbox" th:field="*{soloFriendly}">
                    혼밥하기 좋은 곳인가요?
                </label>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">등록 완료</button>
                <a th:href="@{/restaurant/list}" class="btn btn-secondary">취소</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
