<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상암동 맛집 추천</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; margin: 0; padding: 0; }

        /* 상단 내비게이션 바 스타일 */
        .top-nav {
            background: #e74c3c;
            display: flex;
            justify-content: flex-end;
            align-items: center; /* 핵심: 자식 요소들을 세로 중앙 정렬 */
            padding: 12px 30px; /* 상하 패딩을 살짝 조절 */
            gap: 20px;
        }

        .nav-btn {
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            opacity: 0.9;
            transition: opacity 0.2s;
            display: flex; /* 내부 텍스트 정렬을 위해 추가 */
            align-items: center;
            height: 32px; /* 버튼과 텍스트의 높이를 통일 */
        }

        .nav-btn:hover {
            opacity: 1;
            text-decoration: none; /* 밑줄 대신 선명도로 강조 */
        }

        .nav-btn.register {
            background: rgba(255, 255, 255, 0.2);
            padding: 0 18px; /* 좌우 패딩만 부여 */
            border-radius: 20px;
            transition: background 0.2s;
        }

        .nav-btn.register:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Hero 섹션 (내비게이션 바와 색상을 맞춰 일체감 부여) */
        .hero { background: #e74c3c; color: white; text-align: center; padding: 40px 20px 60px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .hero p { font-size: 1.1rem; opacity: 0.85; }

        .btn-random {
            display: inline-block; margin-top: 25px;
            background: white; color: #e74c3c;
            font-size: 1.3rem; font-weight: bold;
            padding: 15px 40px; border-radius: 50px;
            text-decoration: none; transition: transform 0.2s;
        }
        .btn-random:hover { transform: scale(1.05); }

        .section { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .section h2 { font-size: 1.3rem; color: #333; margin-bottom: 20px; }

        .category-grid { display: flex; gap: 15px; flex-wrap: wrap; }
        .category-btn {
            display: block; width: 160px; padding: 20px;
            text-align: center; border-radius: 12px;
            text-decoration: none; font-size: 1rem; font-weight: bold;
            background: white; color: #333; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: box-shadow 0.2s;
        }
        .category-btn:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .icon { font-size: 2rem; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="/restaurant/list" class="nav-btn">전체 목록</a>
    <a href="/restaurant/new" class="nav-btn register">+ 맛집 등록</a>
</nav>

<div class="hero">
    <h1>상암동 맛집 추천</h1>
    <p>Woori FISA 교육생을 위한 점심 해결사</p>
    <a href="/restaurant/random" class="btn-random">오늘 뭐 먹지? 🎲</a>
</div>

<div class="section">
    <h2>카테고리로 찾기</h2>
    <div class="category-grid">
        <a th:each="cat : ${categories}"
           th:href="@{/restaurant/list(category=${cat.name()})}"
           class="category-btn">
            <span class="icon"
                  th:text="${cat.name() == 'KOREAN'} ? '🍚' :
                            (${cat.name() == 'JAPANESE'} ? '🍱' :
                            (${cat.name() == 'WESTERN'} ? '🍔' : '🥢'))"></span>
            <span th:text="${cat.displayName}"></span>
        </a>
    </div>
</div>

</body>
</html>
